<body>
  <div class="container">
    <app-navbar/>

    <main class="main-content">
      <header class="header">
        <h2>Registro de Ventas</h2>
        <div class="actions">
          <input type="text" placeholder="Buscar Producto" class="search">
          <button class="btn red" [routerLink]="['/ventaform']">Agregar venta</button>
        </div>
      </header>

      <section class="table-section">
        <table>
          <thead>
            <tr>
              <th>Cantidad</th>
              <th>Precio</th>
              <th>Precio Total</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let venta of ventas">
              <td>{{ venta.id }}</td>
              <td>{{ venta.fecha | date : "dd/MM/yyyy"}}</td>
              <td>{{ venta.total }}</td>
            </tr>
          </tbody>
          <tfoot>
            <tr>
              <td colspan="3">Total</td>
              <td>100.00</td>
            </tr>
          </tfoot>
        </table>
      </section>
    </main>
  </div>

</body>
